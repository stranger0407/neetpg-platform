spring.application.name=neetpg-platform

# Database - constructs JDBC URL from Railway's individual PG vars
spring.datasource.url=jdbc:postgresql://${PGHOST:localhost}:${PGPORT:5432}/${PGDATABASE:neetpg}
spring.datasource.username=${PGUSER:postgres}
spring.datasource.password=${PGPASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true

# JWT
jwt.secret=${JWT_SECRET:neetpg-super-secret-key-that-is-at-least-256-bits-long-for-hs256}
jwt.expiration=86400000

# Server - Railway sets PORT
server.port=${PORT:8080}

# CORS - accepts Railway backend, Vercel frontend, and localhost for dev
cors.allowed-origins=${CORS_ORIGINS:http://localhost:5173,http://localhost:3000}

# File upload
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# AI Providers
gemini.api-key=${GEMINI_API_KEY:}
groq.api-key=${GROQ_API_KEY:}

# Production settings
spring.jpa.open-in-view=false
server.error.include-message=always
