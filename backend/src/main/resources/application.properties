spring.application.name=neetpg-platform

# Database
spring.datasource.url=${DATABASE_URL:jdbc:postgresql://localhost:5432/neetpg}
spring.datasource.username=${DATABASE_USERNAME:postgres}
spring.datasource.password=${DATABASE_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true

# JWT
jwt.secret=${JWT_SECRET:neetpg-super-secret-key-that-is-at-least-256-bits-long-for-hs256}
jwt.expiration=86400000

# Server
server.port=${PORT:8080}

# CORS
cors.allowed-origins=${CORS_ORIGINS:http://localhost:5173}

# File upload
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
